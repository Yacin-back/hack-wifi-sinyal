<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R ULTRA ENGINE | GIGS EXCLUSIVE</title>
    <style>
        :root { 
            --neon-pink: #ff0055; 
            --neon-blue: #00d4ff;
            --bg-black: #050505;
            --card-bg: #121212;
            --text-gray: #b0b0b0;
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header Estetik */
        .glass-header {
            width: 100%; padding: 25px 0;
            background: rgba(255, 0, 85, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--neon-pink);
            text-align: center;
            box-shadow: 0 4px 30px rgba(255, 0, 85, 0.2);
        }

        .header-title { margin: 0; letter-spacing: 8px; font-size: 1.8rem; text-shadow: 0 0 10px var(--neon-pink); }
        .sub-status { font-size: 0.7rem; color: var(--neon-blue); text-transform: uppercase; font-weight: bold; }

        /* Container Utama */
        .container { 
            width: 95%; max-width: 900px; 
            margin: 20px auto; display: grid; 
            grid-template-columns: 1fr; gap: 20px;
        }

        @media (min-width: 768px) { .container { grid-template-columns: 1.2fr 0.8fr; } }

        .panel { 
            background: var(--card-bg); padding: 20px; 
            border-radius: 12px; border: 1px solid #222; 
        }

        /* Input Styling */
        label { color: var(--text-gray); font-size: 0.8rem; margin-bottom: 8px; display: block; }
        textarea { 
            width: 100%; height: 120px; background: #1a1a1a; 
            border: 1px solid #333; color: white; border-radius: 8px; 
            padding: 12px; box-sizing: border-box; font-size: 1rem;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--neon-pink); outline: none; box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        select { width: 100%; background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px; border-radius: 6px; }

        /* Button */
        .btn-main { 
            width: 100%; padding: 15px; background: var(--neon-pink); 
            border: none; color: white; font-weight: 800; 
            border-radius: 8px; margin-top: 20px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn-main:active { transform: scale(0.98); }

        /* Output View */
        .preview-pane { 
            position: relative; border-radius: 12px; 
            background: #000; overflow: hidden; min-height: 400px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #222;
        }
        #result-img { max-width: 100%; height: auto; display: none; }
        
        /* Action Buttons */
        .action-bar { 
            margin-top: 10px; display: none; 
            grid-template-columns: 1fr 1fr; gap: 10px; 
        }
        .btn-sec { 
            background: #222; color: white; border: 1px solid #333; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
            text-align: center; text-decoration: none;
        }

        /* Loading Animation */
        .loader { 
            display: none; width: 50px; height: 50px; 
            border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top: 3px solid var(--neon-pink); 
            border-radius: 50%; animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* History */
        .history-panel { margin-top: 20px; }
        .history-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .history-list img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="glass-header">
    <h1 class="header-title">C.R ULTRA ENGINE</h1>
    <div class="sub-status">● System Online | Unrestricted Mode</div>
</div>

<div class="container">
    <div class="panel">
        <label>BRAIN CORE PROMPT</label>
        <textarea id="prompt" placeholder="Describe your fantasy..."></textarea>
        
        <div class="grid-inputs">
            <div>
                <label>ENGINE TYPE</label>
                <select id="model">
                    <option value="flux">FLUX (Ultra Realistic)</option>
                    <option value="flux-realism">FLUX-REALISM (Photo)</option>
                    <option value="flux-anime">FLUX-ANIME (2D/3D)</option>
                </select>
            </div>
            <div>
                <label>ASPECT RATIO</label>
                <select id="ratio">
                    <option value="1024x1024">1:1 Square</option>
                    <option value="768x1280">9:16 Portrait</option>
                    <option value="1280x720">16:9 Landscape</option>
                </select>
            </div>
        </div>

        <button class="btn-main" onclick="executeProcess()">Initiate Generation</button>
        
        <div id="status-log" style="font-family: monospace; font-size: 0.7rem; color: #555; margin-top: 15px;">
            > Waiting for command...
        </div>
    </div>

    <div class="panel">
        <div class="preview-pane" id="preview-box">
            <div class="loader" id="loader"></div>
            <p id="placeholder" style="color: #444;">NO DATA RENDERED</p>
            <img id="result-img" src="" alt="Result">
        </div>
        
        <div class="action-bar" id="action-bar">
            <a id="download-btn" class="btn-sec" download="cr-gen.png">DOWNLOAD</a>
            <button class="btn-sec" onclick="copyLink()">COPY LINK</button>
        </div>

        <div class="history-panel">
            <label>SESSION HISTORY</label>
            <div class="history-list" id="history-list">
                </div>
        </div>
    </div>
</div>

<script>
    function updateLog(msg) {
        document.getElementById('status-log').innerText = "> " + msg;
    }

    async function executeProcess() {
        const prompt = document.getElementById('prompt').value;
        const model = document.getElementById('model').value;
        const ratio = document.getElementById('ratio').value.split('x');
        
        const img = document.getElementById('result-img');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder');
        const actionBar = document.getElementById('action-bar');

        if(!prompt) return alert("Error: Core prompt is empty!");

        // Loading UI
        img.style.display = 'none';
        placeholder.style.display = 'none';
        actionBar.style.display = 'none';
        loader.style.display = 'block';
        updateLog("Accessing Pollinations Neural Gate...");

        // Logic Build URL
        const seed = Math.floor(Math.random() * 9999999);
        const tags = ", nsfw, masterpiece, uncensored, realistic skin, 8k resolution, highly detailed";
        const finalUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt + tags)}?width=${ratio[0]}&height=${ratio[1]}&seed=${seed}&model=${model}&enhance=true`;

        // Load Process
        const tempImg = new Image();
        tempImg.src = finalUrl;
        tempImg.onload = () => {
            img.src = finalUrl;
            img.style.display = 'block';
            loader.style.display = 'none';
            actionBar.style.display = 'grid';
            document.getElementById('download-btn').href = finalUrl;
            updateLog("Generation Complete. Seed: " + seed);
            addToHistory(finalUrl);
        };
        tempImg.onerror = () => {
            loader.style.display = 'none';
            placeholder.style.display = 'block';
            updateLog("Critical Error: Neural Link Severed.");
        };
    }

    function addToHistory(url) {
        const list = document.getElementById('history-list');
        const newImg = document.createElement('img');
        newImg.src = url;
        newImg.onclick = () => {
            document.getElementById('result-img').src = url;
            document.getElementById('download-btn').href = url;
        };
        list.prepend(newImg);
    }

    function copyLink() {
        const url = document.getElementById('result-img').src;
        navigator.clipboard.writeText(url);
        alert("Link copied to clipboard, User.");
    }
</script>

</body>
</html>
