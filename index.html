<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R ENGINE - FORCE BYPASS</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { width: 100%; max-width: 500px; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 10px #0f0; }
        textarea { width: 100%; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #output-container { margin-top: 20px; min-height: 300px; width: 100%; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { max-width: 100%; display: none; border: 1px solid #fff; }
        .loading { display: none; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align: center;">C.R SYSTEM V2</h2>
    <p style="font-size: 0.8rem;">> STATUS: BYPASSING FILTERS...</p>
    
    <textarea id="prompt" placeholder="Ketik deskripsi di sini..."></textarea>
    
    <button onclick="gasGenerate()">EKSEKUSI (FORCE)</button>

    <div id="output-container">
        <p id="wait" class="loading">SEDANG MERENDER... JANGAN REFRESH</p>
        <img id="hasil" src="" alt="AI Result">
    </div>
</div>

<script>
    function gasGenerate() {
        const p = document.getElementById('prompt').value;
        const img = document.getElementById('hasil');
        const wait = document.getElementById('wait');

        if(!p) return alert("Prompt Kosong!");

        // Reset UI
        img.style.display = "none";
        wait.style.display = "block";

        // Logic URL Paling Simple (Tanpa Parameter Ribet dulu buat ngetes)
        const randomSeed = Math.floor(Math.random() * 100000);
        // Kita pake keyword 'nsfw' langsung di tengah biar gak kena filter awal
        const bumbu = " nsfw, uncensored, realistic, 4k";
        const targetUrl = "https://pollinations.ai/p/" + encodeURIComponent(p + bumbu) + "?seed=" + randomSeed + "&model=flux&width=1024&height=1024";

        console.log("Menembak ke: " + targetUrl);

        // Paksa Browser Load Gambar
        img.src = targetUrl;

        img.onload = function() {
            wait.style.display = "none";
            img.style.display = "block";
        };

        img.onerror = function() {
            wait.innerText = "GAGAL! COBA PROMPT LAIN ATAU CEK KONEKSI.";
        };
    }
</script>

</body>
</html>
