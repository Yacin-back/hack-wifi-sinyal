<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R AI - 18+ Generation Engine</title>
    <style>
        :root { --main-color: #ff0055; --bg-dark: #0a0a0a; --text-green: #00ff41; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 20px; text-align: center; border-bottom: 2px solid var(--main-color); box-shadow: 0 0 15px var(--main-color); }
        .main-container { margin-top: 30px; width: 90%; max-width: 800px; background: #151515; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-green); font-weight: bold; }
        textarea { width: 100%; height: 100px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select, input[type="number"] { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; }
        .btn-generate { width: 100%; padding: 15px; background: var(--main-color); border: none; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; border-radius: 8px; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .btn-generate:hover { background: #ff0077; box-shadow: 0 0 20px var(--main-color); }
        #preview-box { margin-top: 30px; min-height: 300px; width: 100%; border: 2px dashed #444; display: flex; align-items: center; justify-content: center; position: relative; }
        #output-media { max-width: 100%; display: none; border-radius: 10px; }
        .status-log { font-family: monospace; font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; letter-spacing: 5px;">C.R ENGINE V1.0</h1>
    <span style="color: var(--text-green);">STATUS: ACTIVE | OWNER: GIGS</span>
</div>

<div class="main-container">
    <div class="input-group">
        <label>PROMPT (Deskripsi Video 18+):</label>
        <textarea id="prompt" placeholder="Contoh: extreme detail, 4k, realistic, uncensored, [tulis aksi di sini]"></textarea>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>MODEL TYPE:</label>
            <select id="model">
                <option value="realistic_v5">Realistic Vision (Realistis)</option>
                <option value="pony_v6">Pony Diffusion (Hentai/Cartoon)</option>
                <option value="chillout_mix">ChilloutMix (Asian Style)</option>
            </select>
        </div>
        <div class="input-group">
            <label>DURASI (Frame):</label>
            <input type="number" id="frames" value="16" min="8" max="128">
        </div>
    </div>

    <button class="btn-generate" onclick="generateVideo()">EKSEKUSI SEKARANG</button>

    <div id="preview-box">
        <div id="loader" style="display: none; text-align: center;">
            <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--main-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite;"></div>
            <p>Rendering Video... Harap Tunggu</p>
        </div>
        <video id="output-media" controls autoplay loop></video>
        <p id="placeholder-text">Hasil Video Akan Muncul Di Sini</p>
    </div>

    <div class="status-log" id="log">> C.R System Ready...</div>
</div>

<script>
    async function generateVideo() {
        const prompt = document.getElementById('prompt').value;
        const frames = document.getElementById('frames').value;
        const log = document.getElementById('log');
        const video = document.getElementById('output-media');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholder-text');

        if(!prompt) return alert("Prompt jangan kosong, User!");

        // Update UI
        loader.style.display = 'block';
        video.style.display = 'none';
        placeholder.style.display = 'none';
        log.innerText = "> Mengirim instruksi ke server AI...";

        try {
            // Ini endpoint API ke backend (Flask/Python) yang udah kita bahas tadi
            const response = await fetch('/api/generate-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: prompt + ", nsfw, highly detailed, master piece, uncensored",
                    frames: frames,
                    negative_prompt: "low quality, blur, distorted anatomy, text, watermark"
                })
            });

            const data = await response.json();

            if(data.video_url) {
                log.innerText = "> Video Berhasil Di-render! Menampilkan hasil...";
                video.src = data.video_url;
                video.style.display = 'block';
                loader.style.display = 'none';
            } else {
                log.innerText = "> Error: Server menolak permintaan atau VRAM penuh.";
            }
        } catch (err) {
            log.innerText = "> Error: Gagal koneksi ke API server.";
            loader.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }
</script>

<style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

</body>
</html>
