<!DOCTYPE html>
<html>
<head>
  <title>Free WiFi Login</title>

    body {
      font-family: Arial;
      background: #f2f2f2;

    .box {

      padding: 20px;
      border-radius: 10px;

      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

      border: none;

    }

</head>
<body>

<div class="box">
  <h2>Free WiFi Access</h2>
  <p>Masukkan password untuk terhubung</p>
  <input type="password" placeholder="WiFi Password">

  <button onclick="fakeLogin()">Connect</button>
</div>

<script>
function fakeLogin() {
  alert("Password salah. Silakan coba lagi.");
}
</script>

</body>
</html>
